  .container {

    text-align: center;
    padding: 40px 60px;
    position: relative;
    overflow: hidden;

    margin-bottom: 44px;
    position: relative;
  }

    font-weight: 900;
    line-height: 1.2;
    letter-spacing: -1.5px;
    margin-bottom: 0;
    position: relative;
    white-space: nowrap;
  }

  .headline em {
    font-style: italic;
    opacity: 0.45;
    display: block;
  }

  .subtitle {
    font-size: 16px;
    font-weight: 400;
    opacity: 0.4;
    max-width: 600px;
    line-height: 1.5;
    position: relative;
  }
